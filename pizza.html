<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Pizzas</title>

<link rel="stylesheet" href="style.css">

<style>

body{
background:#0f0f0f;
color:#fff;
font-family:Arial;
margin:0;
}

header{
padding:20px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.container{
padding:15px;
}

/* CARD */
.pizza-card{
display:flex;
background:#1c1c1c;
border-radius:15px;
margin-bottom:15px;
overflow:hidden;
cursor:pointer;
transition:0.2s;
}

.pizza-card:hover{
transform:scale(1.02);
}

.pizza-img{
width:110px;
height:110px;
object-fit:cover;
}

.pizza-info{
padding:10px;
}

.pizza-nome{
font-size:18px;
font-weight:bold;
}

.pizza-desc{
font-size:14px;
color:#aaa;
}

/* CONFIG */
#configPizza{
display:none;
animation: fade 0.3s ease;
}

@keyframes fade{
from{opacity:0;}
to{opacity:1;}
}

select{
width:100%;
padding:12px;
margin:10px 0;
border-radius:10px;
border:none;
font-size:16px;
}

/* BOTÃO */
.btn{
width:100%;
padding:15px;
background:#ff7a00;
border:none;
border-radius:12px;
color:#fff;
font-size:16px;
margin-top:10px;
cursor:pointer;
}

.btn:hover{
opacity:0.9;
}

.preco{
font-size:20px;
margin-top:10px;
color:#00ff88;
}

/* CARRINHO */
.carrinho-btn{
position:fixed;
bottom:20px;
right:20px;
background:#ff7a00;
width:60px;
height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
cursor:pointer;
}

.carrinho-count{
position:absolute;
top:-5px;
right:-5px;
background:red;
color:#fff;
font-size:12px;
padding:4px 8px;
border-radius:50%;
}

</style>

</head>

<body>

<header>
🍕 Escolha sua Pizza
</header>

<div class="container">

<div id="listaPizzas"></div>

<div id="configPizza">

<img id="imgPizza" class="pizza-img" style="width:100%; height:200px; border-radius:15px; object-fit:cover;">

<h2 id="nomePizza"></h2>
<p id="descPizza" style="color:#ccc;"></p>

<label>Tamanho:</label>
<select id="tamanho" onchange="atualizarPreco()">
<option value="25">Pequena 25cm - R$30</option>
<option value="30">Média 30cm - R$40</option>
<option value="35">Grande 35cm - R$50</option>
</select>

<label>Borda:</label>
<select id="borda" onchange="atualizarPreco()">
<option value="0">Normal</option>
<option value="10">Cheddar +10</option>
<option value="10">Catupiry +10</option>
</select>

<label>Meio a Meio:</label>
<select id="meio">
<option value="">Não</option>
</select>

<div class="preco" id="preco">Total: R$0</div>

<button class="btn" onclick="adicionarPizza()">Adicionar ao Carrinho</button>
<button class="btn" onclick="fecharPizza()">⬅ Voltar</button>

</div>

</div>

<div class="carrinho-btn" onclick="enviarWhatsApp()">
🛒
<div class="carrinho-count" id="count">0</div>
</div>

<script src="pizza.js"></script>

</body>
</html>
