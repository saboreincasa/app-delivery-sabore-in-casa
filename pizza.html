<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Montar Pizza</title>

<link rel="stylesheet" href="estilo.css">

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #111;
  color: white;
}

.container {
  padding: 15px;
  max-width: 1000px;
  margin: auto;
}

h2, h3 {
  margin-top: 20px;
}

select, input[type="checkbox"] {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  margin-bottom: 12px;
  border-radius: 6px;
  border: none;
  background: #fff;
  color: #111;
}

label {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 8px;
}

p {
  margin-top: 5px;
  margin-bottom: 15px;
  color: #ccc;
}

.btn {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: #ff9900;
  color: white;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
}

.btn:hover {
  background: #e68a00;
}

/* Botão flutuante voltar */
#botaoVoltar {
  position: fixed;
  bottom: 20px;
  left: 20px;
  background: #ff9800;
  width: 65px;
  height: 65px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  color: white;
  box-shadow: 0 4px 15px rgba(0,0,0,0.6);
}
</style>
</head>

<body>

<div class="container">

<h2>Monte sua pizza</h2>

<h3>Tamanho</h3>
<select id="tamanho" onchange="atualizarPreco()">
  <option value="pequena">Pequena 25cm - R$39.90</option>
  <option value="media">Média 30cm - R$54.90</option>
  <option value="gigante">Gigante 35cm - R$64.90</option>
</select>

<h3 id="preco">R$39.90</h3>

<h3>Sabor 1</h3>
<select id="sabor1" onchange="mostrarIngredientes(1)"></select>
<p id="ingredientes1"></p>

<h3>Sabor 2</h3>
<select id="sabor2" onchange="mostrarIngredientes(2)"></select>
<p id="ingredientes2"></p>

<h3>Borda</h3>
<label>
  <input type="checkbox" id="catupiry"> Catupiry +10
</label>
<label>
  <input type="checkbox" id="cheddar"> Cheddar +10
</label>

<button onclick="adicionarCarrinho()" class="btn">Adicionar ao carrinho</button>

</div>

<!-- Botão flutuante voltar -->
<div id="botaoVoltar" onclick="window.history.back()">Voltar</div>

<script src="pizza.js"></script>

</body>
</html>
