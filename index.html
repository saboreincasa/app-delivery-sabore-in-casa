<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Sabore in Casa</title>

<link rel="stylesheet" href="style.css">

<script src="app.js"></script>
<script src="pix.js"></script>
<script src="mapa.js"></script>

</head>

<body>

<header>

<h1>Sabore in Casa 🍕</h1>

<input
type="text"
placeholder="Buscar pizzas, bebidas..."
class="search"
/>

</header>

<!-- MENU ABAIXO DA BUSCA -->

<section class="menu">

<button>🍕 Pizzas</button>
<button>🔥 Combos</button>
<button>🥤 Bebidas</button>
<button>🛒 Carrinho</button>

</section>


<!-- LISTA DE PRODUTOS -->

<section class="produtos">

<div class="card">

<img src="img/calabresa.png">

<div>

<h3>Pizza Calabresa</h3>
<p>R$ 40,00</p>

<button onclick="addCarrinho('Pizza Calabresa',40)">
Adicionar
</button>

</div>

</div>


<div class="card">

<img src="img/meio.png">

<div>

<h3>Pizza Meio a Meio</h3>
<p>R$ 44,00</p>

<button onclick="addCarrinho('Pizza Meio a Meio',44)">
Adicionar
</button>

</div>

</div>

</section>


<!-- BEBIDAS -->

<section class="bebidas">

<h2>Bebidas</h2>

<div class="bebidas-scroll">

<div class="bebida">

<img src="img/heineken.png">
<p>Heineken 473ml</p>
<p>R$ 9</p>

<button onclick="addCarrinho('Heineken',9)">
Adicionar
</button>

</div>

<div class="bebida">

<img src="img/brahma.png">
<p>Brahma</p>
<p>R$ 7</p>

<button onclick="addCarrinho('Brahma',7)">
Adicionar
</button>

</div>

</div>

</section>

</body>
</html>
