<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Sabore In Casa</title>

<link rel="manifest" href="manifeste.json">

<style>

body{
font-family:Arial;
margin:0;
background:#111;
color:white;
}

header{
background:#c62828;
padding:18px;
text-align:center;
font-size:26px;
font-weight:bold;
}

.endereco{
background:#1f1f1f;
padding:10px;
text-align:center;
font-size:14px;
}

.banner{
height:200px;
background:url("https://images.unsplash.com/photo-1513104890138-7c749659a591");
background-size:cover;
background-position:center;
}

.container{
padding:15px;
max-width:900px;
margin:auto;
}

h2{
border-left:5px solid orange;
padding-left:10px;
margin-top:30px;
}

.card{
background:#1f1f1f;
border-radius:12px;
overflow:hidden;
margin-bottom:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.5);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card-content{
padding:15px;
}

button{
background:#2ecc71;
border:none;
padding:10px;
width:100%;
border-radius:8px;
color:white;
font-size:15px;
margin-top:6px;
cursor:pointer;
}

button:hover{
background:#27ae60;
}

#botaoCarrinho{
position:fixed;
bottom:20px;
right:20px;
background:#ff9800;
width:65px;
height:65px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
cursor:pointer;
box-shadow:0 4px 15px rgba(0,0,0,0.6);
}

#carrinho{
background:#1f1f1f;
padding:15px;
border-radius:10px;
margin-top:30px;
}

.item{
display:flex;
justify-content:space-between;
margin-bottom:5px;
}

.remover{
background:red;
border:none;
color:white;
padding:3px 6px;
border-radius:5px;
cursor:pointer;
}

.total{
font-size:20px;
margin-top:10px;
}

input,select{
width:100%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:none;
}

.enviar{
background:#25D366;
font-size:18px;
padding:12px;
margin-top:15px;
}

</style>

</head>

<body>

<header>
🍕 Sabore In Casa
</header>

<div class="endereco">

📍 Rua Maria de Lourdes da Cruz Nº 378  
Bairro Mantiqueira – Belo Horizonte  
CEP 31655-230

</div>

<div class="banner"></div>

<div class="container">

<h2>🍕 Cardápio</h2>

<div id="produtos"></div>

<h2>🛒 Carrinho</h2>

<div id="carrinho">

<div id="lista"></div>

<div class="total">
Total: R$ <span id="total">0.00</span>
</div>

<input id="enderecoCliente" placeholder="Digite seu endereço">

<select id="pagamento">

<option>PIX</option>
<option>Dinheiro</option>
<option>Cartão</option>

</select>

<input id="troco" placeholder="Troco para quanto?">

<button class="enviar" onclick="enviarPedido()">
Enviar pedido no WhatsApp
</button>

</div>

</div>

<div id="botaoCarrinho" onclick="scrollCarrinho()">🛒</div>

<script>

let numero="5531983391576"
let taxaEntrega=5

let carrinho=[]
let total=0

async function carregarProdutos(){

let resposta = await fetch("produtos.json")

let produtos = await resposta.json()

let html=""

produtos.forEach(p=>{

html+=`

<div class="card">

<img src="${p.foto}">

<div class="card-content">

<h3>${p.nome}</h3>

<button onclick="add('${p.nome}',${p.preco})">

Adicionar - R$${p.preco}

</button>

</div>

</div>

`

})

document.getElementById("produtos").innerHTML=html

}

function add(nome,preco){

carrinho.push({nome,preco})

total+=preco

atualizar()

}

function remover(i){

total-=carrinho[i].preco

carrinho.splice(i,1)

atualizar()

}

function atualizar(){

let lista=""

carrinho.forEach((item,i)=>{

lista+=`

<div class="item">

${item.nome} - R$${item.preco}

<button class="remover" onclick="remover(${i})">X</button>

</div>

`

})

document.getElementById("lista").innerHTML=lista

document.getElementById("total").innerText=(total+taxaEntrega).toFixed(2)

}

function scrollCarrinho(){

document.getElementById("carrinho").scrollIntoView({

behavior:"smooth"

})

}

function enviarPedido(){

let endereco=document.getElementById("enderecoCliente").value
let pagamento=document.getElementById("pagamento").value
let troco=document.getElementById("troco").value

let msg="🍕 Pedido - Sabore In Casa %0A%0A"

carrinho.forEach(item=>{

msg+=item.nome+" - R$"+item.preco+"%0A"

})

msg+="%0ATaxa entrega: R$"+taxaEntrega
msg+="%0ATotal: R$"+(total+taxaEntrega).toFixed(2)

msg+="%0AEndereço: "+endereco

msg+="%0APagamento: "+pagamento

msg+="%0ATroco: "+troco

window.open("https://wa.me/"+numero+"?text="+msg)

}

carregarProdutos()

</script>

</body>
</html>
