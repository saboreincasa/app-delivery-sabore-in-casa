<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sabore In Casa</title>

<style>

body{
font-family:Arial;
margin:0;
background:#121212;
color:white;
}

header{
background:#d62828;
padding:18px;
text-align:center;
font-size:26px;
font-weight:bold;
}

.banner{
height:200px;
background:url("https://images.unsplash.com/photo-1513104890138-7c749659a591");
background-size:cover;
background-position:center;
}

.container{
padding:15px;
max-width:900px;
margin:auto;
}

h2{
border-left:5px solid #ffb703;
padding-left:10px;
margin-top:30px;
}

.card{
background:#1f1f1f;
border-radius:12px;
overflow:hidden;
margin-bottom:20px;
box-shadow:0 4px 15px rgba(0,0,0,0.5);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card-content{
padding:15px;
}

button{
background:#2ecc71;
border:none;
padding:10px;
width:100%;
border-radius:8px;
color:white;
font-size:15px;
margin-top:6px;
cursor:pointer;
}

button:hover{
background:#27ae60;
}

#carrinho{
background:#1f1f1f;
padding:15px;
border-radius:10px;
margin-top:30px;
}

.item{
display:flex;
justify-content:space-between;
margin-bottom:5px;
}

.remover{
background:red;
padding:3px 6px;
border-radius:5px;
border:none;
color:white;
cursor:pointer;
}

.total{
font-size:20px;
margin-top:10px;
}

input,select{
width:100%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:none;
}

.enviar{
background:#25D366;
font-size:18px;
padding:12px;
margin-top:15px;
}

</style>

</head>

<body>

<header>🍕 Sabore In Casa</header>

<div class="banner"></div>

<div class="container">

<h2>Pizzas</h2>

<div id="pizzas"></div>

<h2>Bebidas</h2>

<div id="bebidas"></div>

<h2>Carrinho</h2>

<div id="carrinho">

<div id="lista"></div>

<div class="total">
Total: R$ <span id="total">0.00</span>
</div>

<input id="endereco" placeholder="Digite seu endereço">

<select id="pagamento">
<option>PIX</option>
<option>Dinheiro</option>
<option>Cartão</option>
</select>

<input id="troco" placeholder="Troco para quanto?">

<button class="enviar" onclick="pedido()">Enviar pedido no WhatsApp</button>

</div>

</div>

<script>

/* CONFIGURAÇÃO */

let numero="5531983391576"
let taxaEntrega=5

/* PRODUTOS */

let pizzas=[

{
nome:"Calabresa",
foto:"https://images.unsplash.com/photo-1594007654729-407eedc4fe24",
tamanhos:[
{nome:"25cm",preco:39.9},
{nome:"30cm",preco:49.9},
{nome:"35cm",preco:59.9}
]
},

{
nome:"Frango Catupiry",
foto:"https://images.unsplash.com/photo-1601924582975-7e9c7b4f9d19",
tamanhos:[
{nome:"25cm",preco:42.9},
{nome:"30cm",preco:52.9},
{nome:"35cm",preco:62.9}
]
}

]

let bebidas=[

{
nome:"Heineken Long Neck",
foto:"https://images.unsplash.com/photo-1608270586620-248524c67de9",
preco:9.9
},

{
nome:"Brahma Lata",
foto:"https://images.unsplash.com/photo-1563379091339-03246963d51a",
preco:5.9
}

]

/* CARRINHO */

let carrinho=[]
let total=0

function carregarProdutos(){

let pizzaHTML=""

pizzas.forEach(p=>{

pizzaHTML+=`
<div class="card">
<img src="${p.foto}">
<div class="card-content">
<h3>${p.nome}</h3>
`

p.tamanhos.forEach(t=>{

pizzaHTML+=`
<button onclick="add('${p.nome} ${t.nome}',${t.preco})">
${t.nome} - R$${t.preco}
</button>
`

})

pizzaHTML+=`</div></div>`

})

document.getElementById("pizzas").innerHTML=pizzaHTML

let bebidaHTML=""

bebidas.forEach(b=>{

bebidaHTML+=`
<div class="card">
<img src="${b.foto}">
<div class="card-content">
<h3>${b.nome}</h3>
<button onclick="add('${b.nome}',${b.preco})">
Adicionar - R$${b.preco}
</button>
</div>
</div>
`

})

document.getElementById("bebidas").innerHTML=bebidaHTML

}

function add(nome,preco){

carrinho.push({nome,preco})

total+=preco

atualizar()

}

function remover(index){

total-=carrinho[index].preco

carrinho.splice(index,1)

atualizar()

}

function atualizar(){

let lista=""

carrinho.forEach((item,index)=>{

lista+=`
<div class="item">
${item.nome} - R$${item.preco}
<button class="remover" onclick="remover(${index})">X</button>
</div>
`

})

document.getElementById("lista").innerHTML=lista

document.getElementById("total").innerText=(total+taxaEntrega).toFixed(2)

}

function pedido(){

let endereco=document.getElementById("endereco").value
let pagamento=document.getElementById("pagamento").value
let troco=document.getElementById("troco").value

let msg="🍕 Pedido - Sabore In Casa %0A%0A"

carrinho.forEach(item=>{
msg+=item.nome+" - R$"+item.preco+"%0A"
})

msg+="%0ATaxa entrega: R$"+taxaEntrega
msg+="%0ATotal: R$"+(total+taxaEntrega).toFixed(2)
msg+="%0AEndereço: "+endereco
msg+="%0APagamento: "+pagamento
msg+="%0ATroco: "+troco

window.open("https://wa.me/"+numero+"?text="+msg)

}

carregarProdutos()

</script>

</body>
</html>
