<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Sabore In Casa</title>

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="css/estilo.css">

</head>

<body>

<header>
<img src="imagens/logo.png" class="logo">
<div class="titulo">Sabore In Casa</div>
</header>

<div class="endereco">
📍 Rua Maria de Lourdes da Cruz Nº 378  
Bairro Mantiqueira – Belo Horizonte
</div>

<div class="banner"></div>

<div class="container">

<input class="busca" id="busca" placeholder="🔎 Buscar produto">

<div class="btn-flutuantes">

<div class="linha">
<button onclick="filtrar('Pizza')">🍕 Pizzas</button>
<button onclick="filtrar('Coca')">🥤 Bebidas</button>
</div>

<div class="linha">
<button onclick="filtrar('Combo')">🎁 Combos</button>
<button onclick="filtrar('Promo')">🔥 Promoções</button>
</div>

</div>

<div id="produtos"></div>

<div id="carrinho">

<h2>🛒 Carrinho</h2>

<div id="lista"></div>

<div class="total">
Total + entrega: R$ <span id="total">0.00</span>
</div>

<input id="enderecoCliente" placeholder="Digite seu endereço">

<select id="pagamento">
<option>PIX</option>
<option>Dinheiro</option>
<option>Cartão</option>
</select>

<input id="troco" placeholder="Troco para quanto?">

<button class="enviar" onclick="enviarPedido()">
Enviar pedido no WhatsApp
</button>

</div>

</div>

<div id="botaoCarrinho" onclick="scrollCarrinho()">
🛒
<div id="contador">0</div>
</div>

<script src="js/app.js"></script>

</body>
</html>
