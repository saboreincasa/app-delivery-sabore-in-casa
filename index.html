<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sabore In Casa</title>

<link rel="manifest" href="manifest.json">

<style>

body{
font-family:Arial;
margin:0;
background:#111;
color:white;
}

header{
background:#c62828;
text-align:center;
padding:15px;
}

.logo{
width:140px;
}

.titulo{
font-size:24px;
font-weight:bold;
}

.endereco{
background:#1f1f1f;
padding:10px;
text-align:center;
font-size:14px;
margin:10px;
border-radius:6px;
}

.banner{
height:180px;
border-radius:12px;
margin:10px;
background-size:cover;
background-position:center;
}

.container{
padding:15px;
max-width:1000px;
margin:auto;
}

.busca{
width:100%;
padding:12px;
border-radius:8px;
border:none;
margin-bottom:15px;
background:white;
color:#111;
}

.btn-flutuantes{
display:flex;
flex-direction:column;
gap:8px;
margin-bottom:15px;
}

.linha{
display:flex;
gap:10px;
}

.linha button{
flex:1;
background:#ff9800;
border:none;
padding:12px;
border-radius:10px;
color:white;
font-size:16px;
cursor:pointer;
}

#produtos{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
}

.card{
background:#1f1f1f;
border-radius:12px;
overflow:hidden;
}

.card img{
width:100%;
height:140px;
object-fit:cover;
}

.card-content{
padding:12px;
}

.preco{
color:#2ecc71;
font-size:17px;
}

.card button{
background:#ff9800;
border:none;
padding:10px;
width:100%;
border-radius:8px;
color:white;
margin-top:8px;
cursor:pointer;
}

#botaoCarrinho{
position:fixed;
bottom:20px;
right:20px;
background:#ff9800;
width:65px;
height:65px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
cursor:pointer;
}

#contador{
position:absolute;
top:-5px;
right:-5px;
background:red;
color:white;
font-size:12px;
padding:4px 6px;
border-radius:50%;
}

#carrinho{
background:#1f1f1f;
padding:15px;
border-radius:10px;
margin-top:25px;
}

.item{
display:flex;
justify-content:space-between;
margin-bottom:6px;
}

.total{
font-size:20px;
margin-top:10px;
}

input,select{
width:100%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:none;
}

#enderecoCliente,#troco,#pagamento{
background:white;
color:#111;
}

.enviar{
background:#25D366;
color:white;
font-size:18px;
padding:14px;
margin-top:15px;
border-radius:20px;
border:none;
font-weight:bold;
cursor:pointer;
}

footer{
text-align:center;
margin-top:40px;
font-size:13px;
color:#aaa;
}

</style>
</head>

<body>

<header>

<img src="imagens/logo.png" class="logo">

<div class="titulo">Sabore In Casa</div>

</header>

<div class="endereco">

📍 Rua Maria de Lourdes da Cruz Nº 378  
Bairro Mantiqueira – Belo Horizonte  

<button onclick="abrirMapa()">📍 Ver no mapa</button>

</div>

<div id="banner" class="banner"></div>

<div class="container">

<input class="busca" id="busca" placeholder="🔎 Buscar produto">

<div class="btn-flutuantes">

<div class="linha">
<button onclick="filtrar('pizza')">🍕 Pizzas</button>
<button onclick="filtrar('cerveja')">🍺 Bebidas</button>
</div>

<div class="linha">
<button onclick="filtrar('combo')">🎁 Combos</button>
<button onclick="mostrar(produtos)">🔥 Todos</button>
</div>

</div>

<h2>⭐ Combos da Semana</h2>
<div id="combosSemana"></div>

<div id="produtos"></div>

<div id="carrinho">

<h2>🛒 Carrinho</h2>

<div id="lista"></div>

<div class="total">
Total + entrega: R$ <span id="total">0.00</span>
</div>

<input id="enderecoCliente" placeholder="Digite seu endereço">

<select id="pagamento">
<option>PIX</option>
<option>Dinheiro</option>
<option>Cartão</option>
</select>

<input id="troco" placeholder="Troco para quanto?">

<button class="enviar" onclick="enviarPedido()">
Enviar pedido no WhatsApp
</button>

</div>

</div>

<div id="botaoCarrinho" onclick="scrollCarrinho()">
🛒
<div id="contador">0</div>
</div>

<footer>

© Sabore In Casa  
Desenvolvido por <b>Carlos Henrique</b>

</footer>

<script>

let numero="5531983391576"
let taxaEntrega=6.99

let carrinho=JSON.parse(localStorage.getItem("carrinho"))||[]

let produtos=[]

let banners=[
"https://images.unsplash.com/photo-1513104890138-7c749659a591?w=1200",
"https://images.unsplash.com/photo-1548365328-9f547fb0953d?w=1200",
"https://images.unsplash.com/photo-1604382354936-07c5d9983bd3?w=1200"
]

function bannerAutomatico(){

let b=document.getElementById("banner")

let i=0

setInterval(()=>{

b.style.backgroundImage=`url(${banners[i]})`

i++

if(i>=banners.length)i=0

},4000)

}

async function carregarProdutos(){

let res=await fetch("produtos.json")

produtos=await res.json()

mostrar(produtos)

mostrarCombos()

}

function mostrar(lista){

let html=""

lista.forEach(p=>{

html+=`
<div class="card">

<img src="${p.foto}">

<div class="card-content">

<h3>${p.nome}</h3>

<div class="preco">R$ ${p.preco.toFixed(2)}</div>

<button onclick="add('${p.nome}',${p.preco})">
Adicionar
</button>

</div>

</div>
`

})

document.getElementById("produtos").innerHTML=html

}

function filtrar(cat){

let filtrados=produtos.filter(p=>p.categoria==cat)

mostrar(filtrados)

}

function mostrarCombos(){

let combos=produtos.filter(p=>p.categoria=="combo")

let html=""

combos.forEach(c=>{

html+=`<div class="card">

<img src="${c.foto}">

<div class="card-content">

<h3>${c.nome}</h3>

<div class="preco">R$ ${c.preco.toFixed(2)}</div>

<button onclick="add('${c.nome}',${c.preco})">
Adicionar
</button>

</div>

</div>`

})

document.getElementById("combosSemana").innerHTML=html

}

function add(nome,preco){

let item=carrinho.find(p=>p.nome==nome)

if(item)item.qtd++

else carrinho.push({nome,preco,qtd:1})

salvar()

}

function salvar(){

localStorage.setItem("carrinho",JSON.stringify(carrinho))

atualizar()

}

function atualizar(){

let lista=""

let total=0

let qtd=0

carrinho.forEach((i,idx)=>{

total+=i.preco*i.qtd

qtd+=i.qtd

lista+=`<div class="item">${i.nome} x${i.qtd}
<button onclick="remover(${idx})">❌</button>
</div>`

})

document.getElementById("lista").innerHTML=lista

document.getElementById("contador").innerText=qtd

document.getElementById("total").innerText=(total+taxaEntrega).toFixed(2)

}

function remover(i){

carrinho.splice(i,1)

salvar()

}

function scrollCarrinho(){

document.getElementById("carrinho").scrollIntoView({behavior:"smooth"})

}

function abrirMapa(){

window.open("https://maps.google.com/?q=Rua+Maria+de+Lourdes+da+Cruz+378+Belo+Horizonte")

}

function enviarPedido(){

let endereco=document.getElementById("enderecoCliente").value

let pagamento=document.getElementById("pagamento").value

let troco=document.getElementById("troco").value

if(carrinho.length==0){

alert("Adicione produtos")

return

}

let msg="🍕 *Pedido Sabore In Casa*%0A%0A"

let total=0

carrinho.forEach(i=>{

msg+=`➡ ${i.nome} x${i.qtd}%0A`

total+=i.preco*i.qtd

})

msg+=`%0A🛵 Entrega: R$ ${taxaEntrega}`

msg+=`%0A💰 Total: R$ ${(total+taxaEntrega).toFixed(2)}`

msg+=`%0A📍 ${endereco}`

msg+=`%0A💳 ${pagamento}`

msg+=`%0A💵 Troco: ${troco}`

window.open(`https://wa.me/${numero}?text=${msg}`)

if(Notification.permission==="granted"){

new Notification("Pedido enviado com sucesso!")

}

}

bannerAutomatico()

carregarProdutos()

atualizar()

</script>

</body>
</html>
