<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Sabore In Casa</title>

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<img src="imagens/logo.png" class="logo">

<div class="titulo">
Sabore In Casa
</div>

</header>

<!-- ENDEREÇO -->

<div class="endereco">

📍 Rua Maria de Lourdes da Cruz Nº 378<br>
Bairro Mantiqueira – Belo Horizonte

<br><br>

<button onclick="abrirMapa()">📍 Ver no mapa</button>

</div>

<!-- BANNER -->

<div id="banner" class="banner"></div>

<div class="container">

<!-- BUSCA -->

<input 
class="busca" 
id="busca" 
placeholder="🔎 Buscar produto">

<!-- BOTÕES -->

<div class="btn-flutuantes">

<div class="linha">

<button onclick="abrirPizzas()">
🍕 Pizzas
</button>

<button onclick="filtrar('cerveja')">
🥤 Bebidas
</button>

</div>

<div class="linha">

<button onclick="filtrar('combo')">
🎁 Combos
</button>

<button onclick="filtrar('snaks')">
🍟 Snaks
</button>

</div>

</div>

<!-- COMBOS DA SEMANA -->

<h2>⭐ Combos da Semana</h2>

<div id="combosSemana"></div>

<!-- PRODUTOS -->

<div id="produtos"></div>

<!-- CARRINHO -->

<div id="carrinho">

<h2>🛒 Carrinho</h2>

<div id="lista"></div>

<div class="total">

Total + entrega: R$ 
<span id="total">0.00</span>

</div>

<input 
id="enderecoCliente" 
placeholder="Digite seu endereço">

<select id="pagamento">

<option>PIX</option>
<option>Dinheiro</option>
<option>Cartão</option>

</select>

<input 
id="troco" 
placeholder="Troco para quanto?">

<button class="enviar" onclick="enviarPedido()">

Enviar pedido no WhatsApp

</button>

</div>

</div>

<!-- BOTÃO CARRINHO -->

<div id="botaoCarrinho" onclick="scrollCarrinho()">

🛒

<div id="contador">0</div>

</div>

<footer>

© Sabore In Casa <br>
Desenvolvido por <b>Carlos Henrique</b>

</footer>

<script src="app.js"></script>
<script src="mapa.js"></script>
<script src="notificacao.js"></script>

</body>
</html>
