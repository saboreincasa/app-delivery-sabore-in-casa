<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Sabore In Casa</title>

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">

<style>
#toast {
    visibility: hidden;
    min-width: 250px;
    background-color: #333;
    color: #fff;
    text-align: center;
    border-radius: 8px;
    padding: 12px;
    position: fixed;
    bottom: 50px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 1000;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.5s, bottom 0.5s;
}
#toast.show {
    visibility: visible;
    opacity: 1;
    bottom: 80px;
}

/* 🔥 NOVO ESTILO DO ENDEREÇO */
.endereco-box{
    display:flex;
    flex-direction:column;
    gap:8px;
    margin-bottom:10px;
}

.endereco-box input{
    padding:10px;
    border-radius:6px;
    border:1px solid #ccc;
}

#bairroSelecionado{
    background:#f5f5f5;
    cursor:pointer;
}
</style>

</head>

<body>

<header class="header-topo">
  <div class="overlay"></div>
</header>

<div class="endereco">
📍 Rua Maria de Lourdes da Cruz Nº 378<br>
Bairro Mantiqueira – Belo Horizonte
<br>
<button onclick="abrirMapa()">📍 Ver no mapa</button>
</div>

<div id="banner" class="banner" style="cursor:pointer;"></div>

<div class="container">

<input class="busca" id="busca" placeholder="🔎 Buscar produto">

<div class="btn-flutuantes">

<div class="linha">
<button onclick="abrirPizzas()">🍕 Pizzas</button>
<button onclick="filtrar('bebidas')">🥤 Bebidas</button>
</div>

<div class="linha">
<button onclick="filtrar('combo')">🎁 Combos</button>
<button onclick="filtrar('snacks')">🍟 Snacks</button>
</div>

</div>

<h2 id="tituloCombos">⭐ Combos da Semana</h2>
<div id="combosSemana"></div>

<div id="produtos"></div>

<!-- 🔥 CARRINHO ATUALIZADO -->
<div id="carrinho">
<h2>🛒 Carrinho</h2>

<div id="lista"></div>

<div class="total">
Total + entrega: R$ <span id="total">0.00</span>
</div>

<!-- 📍 ENDEREÇO NOVO -->
<div class="endereco-box">

<h3>📍 Endereço de entrega</h3>

<input id="rua" placeholder="Rua / Avenida">
<input id="numero" placeholder="Número">
<input id="complemento" placeholder="Complemento (opcional)">

<h3>🏘️ Bairro</h3>

<input id="bairroSelecionado" placeholder="Clique para selecionar bairro" readonly onclick="abrirModalBairros()">

<div id="freteInfo">🚚 Frete será calculado automaticamente</div>

</div>

<select id="pagamento">
<option>PIX</option>
<option>Dinheiro</option>
<option>Cartão</option>
</select>

<input id="troco" placeholder="Troco para quanto?">

<button class="enviar" onclick="enviarPedido()">
Enviar pedido no WhatsApp
</button>

</div>

</div>

<div id="botaoCarrinho" onclick="scrollCarrinho()">
🛒 <div id="contador">0</div>
</div>

<footer>
© Sabore In Casa<br>
Desenvolvido por <b>Carlos Henrique</b>
</footer>

<div id="toast"></div>

<script src="app.js"></script>

</body>
</html>
