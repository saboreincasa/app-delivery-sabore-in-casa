<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Sabore In Casa</title>

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="estilo.css">
</head>

<body>

<header>
<img src="imagens/logo.png" class="logo">
<div class="titulo">Sabore In Casa</div>
</header>

<div class="endereco">
📍 Rua Maria de Lourdes da Cruz Nº 378<br>
Bairro Mantiqueira – Belo Horizonte
<br>
<button onclick="abrirMapa()">📍 Ver no mapa</button>
</div>

<div id="banner" class="banner"></div>

<div class="container">

<input class="busca" placeholder="🔎 Buscar produto">

<div class="btn-flutuantes">

<div class="linha">
<button onclick="abrirPizzas()">🍕 Pizzas</button>
<button>🥤 Bebidas</button>
</div>

<div class="linha">
<button>🎁 Combos</button>
<button>🍟 Snaks</button>
</div>

</div>

<div id="produtos"></div>

<div id="carrinho">
<h2>🛒 Carrinho</h2>

<div id="lista"></div>

<div class="total">
Total: R$ <span id="total">0.00</span>
</div>

<input id="enderecoCliente" placeholder="Digite seu endereço">

<select id="pagamento">
<option>PIX</option>
<option>Dinheiro</option>
<option>Cartão</option>
</select>

<button onclick="enviarPedido()">Enviar no WhatsApp</button>
</div>

</div>

<div id="botaoCarrinho" onclick="scrollCarrinho()">
🛒 <span id="contador">0</span>
</div>

<!-- 🔥 MODAL PIZZA -->
<div id="modalPizza" class="modal">
<div class="modal-content">

<img id="imgPizza" class="img-pizza">

<h2 id="nomePizza"></h2>

<select id="tamanho">
<option value="23">Pequena 25cm - R$23</option>
<option value="38">Grande 30cm - R$38</option>
<option value="42">Gigante 35cm - R$42</option>
</select>

<input id="meiaPizza" placeholder="Outro sabor (meio a meio)">

<select id="borda">
<option value="0">Sem borda</option>
<option value="10">Catupiry +10</option>
<option value="10">Cheddar +10</option>
</select>

<input id="obsPizza" placeholder="Observação">

<button onclick="confirmarPizza()">Adicionar ao carrinho</button>
<button onclick="fecharModal()">Cancelar</button>

</div>
</div>

<script src="app.js"></script>
<script src="mapa.js"></script>
<script src="notificacao.js"></script>

</body>
</html>
