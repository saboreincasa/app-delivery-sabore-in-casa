<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sabore In Casa</title>
<link rel="stylesheet" href="estilo.css">
<link rel="manifest" href="manifesto.json">
</head>
<body>

<header class="topo">
  <img src="imagens/logo.png" class="logo" alt="Sabore In Casa">
  <input type="text" id="buscar" placeholder="Buscar pizzas ou bebidas...">
</header>

<!-- Menu principal -->
<nav class="menu-categorias">
  <button onclick="filtrar('pizza')">🍕 Pizzas</button>
  <button onclick="filtrar('combo')">🔥 Combos</button>
  <button onclick="filtrar('bebida')">🍺 Bebidas</button>
  <button onclick="abrirCarrinho()">🛒 Carrinho</button>
</nav>

<section class="banner">
  <h2>Promoção da Semana</h2>
</section>

<!-- Produtos -->
<section id="produtos"></section>

<!-- Carrinho flutuante -->
<div class="carrinho-flutuante" onclick="abrirCarrinho()">
  🛒 <span id="contador">0</span>
</div>

<!-- Painel do carrinho -->
<div id="carrinho" style="display:none;">
  <h2>Carrinho</h2>
  <div id="listaCarrinho"></div>
  <p>Total: R$ <span id="total">0</span></p>
  <button onclick="finalizarPedido()">Finalizar Pedido</button>
</div>

<script src="app.js"></script>
<script src="pix.js"></script>
<script src="mapa.js"></script>
<script src="impressao.js"></script>
<script src="notificacao.js"></script>
<script src="service-worker.js"></script>
</body>
</html>
