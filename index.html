<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Sabore In Casa</title>

<link rel="stylesheet" href="style.css">

<style>
#toast{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    background:#222;
    color:#fff;
    padding:10px 20px;
    border-radius:8px;
    display:none;
    z-index:999;
}

#upsellBox{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    background:#fff;
    border-top:3px solid #ff6600;
    padding:15px;
    display:none;
    z-index:999;
}

.upsell-item{
    display:flex;
    justify-content:space-between;
    margin-top:10px;
}

.barra-frete{
    background:#eee;
    height:10px;
    border-radius:10px;
    margin-top:10px;
}
.barra-frete span{
    display:block;
    height:100%;
    background:#4CAF50;
    border-radius:10px;
}
</style>

</head>

<body>

<h2>🍕 Sabore In Casa</h2>

<input id="busca" placeholder="Buscar...">

<div>
<button onclick="abrirPizzas()">Pizzas</button>
<button onclick="filtrar('bebidas')">Bebidas</button>
<button onclick="filtrar('combo')">Combos</button>
<button onclick="filtrar('snaks')">Snaks</button>
</div>

<div id="combosSemana"></div>
<div id="produtos"></div>

<h2>🛒 Carrinho</h2>
<div id="lista"></div>

<p id="freteInfo"></p>

<div class="barra-frete">
<span id="barraFrete" style="width:0%"></span>
</div>

<input id="cupom" placeholder="Cupom desconto">

<p>Total: R$ <span id="total">0</span></p>

<input id="enderecoCliente" placeholder="Digite seu bairro">

<select id="pagamento">
<option>PIX</option>
<option>Dinheiro</option>
<option>Cartão</option>
</select>

<button onclick="enviarPedido()">Enviar Pedido</button>

<div id="toast"></div>

<div id="upsellBox"></div>

<script src="app.js"></script>

</body>
</html>
