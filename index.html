<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Sabore In Casa</title>

<link rel="manifest" href="manifest.json">

<style>

body{
font-family:Arial;
margin:0;
background:#111;
color:white;
}

header{
background:#c62828;
text-align:center;
padding:15px;
}

.logo{
width:130px;
margin-bottom:5px;
}

.titulo{
font-size:24px;
font-weight:bold;
}

.endereco{
background:#1f1f1f;
padding:10px;
text-align:center;
font-size:14px;
}

.banner{
height:180px;
background:url("https://images.unsplash.com/photo-1513104890138-7c749659a591?w=1200");
background-size:cover;
background-position:center;
}

.container{
padding:15px;
max-width:1000px;
margin:auto;
}

.busca{
width:100%;
padding:12px;
border-radius:8px;
border:none;
margin-bottom:15px;
}

.categorias{
display:flex;
gap:10px;
overflow:auto;
margin-bottom:15px;
}

.cat{
background:#1f1f1f;
padding:8px 15px;
border-radius:20px;
cursor:pointer;
white-space:nowrap;
}

#produtos{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
}

.card{
background:#1f1f1f;
border-radius:12px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,0.5);
}

.card img{
width:100%;
height:140px;
object-fit:cover;
}

.card-content{
padding:12px;
}

.preco{
color:#2ecc71;
font-size:17px;
margin-top:5px;
}

button{
background:#2ecc71;
border:none;
padding:10px;
width:100%;
border-radius:8px;
color:white;
margin-top:8px;
cursor:pointer;
}

button:hover{
background:#27ae60;
}

#botaoCarrinho{
position:fixed;
bottom:20px;
right:20px;
background:#ff9800;
width:65px;
height:65px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
cursor:pointer;
box-shadow:0 4px 15px rgba(0,0,0,0.6);
}

#contador{
position:absolute;
top:-5px;
right:-5px;
background:red;
color:white;
font-size:12px;
padding:3px 6px;
border-radius:50%;
}

#carrinho{
background:#1f1f1f;
padding:15px;
border-radius:10px;
margin-top:25px;
}

.item{
display:flex;
justify-content:space-between;
margin-bottom:6px;
}

.total{
font-size:20px;
margin-top:10px;
}

input,select{
width:100%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:none;
}

.enviar{
background:#25D366;
font-size:18px;
padding:12px;
margin-top:15px;
}

</style>

</head>

<body>

<header>

<img src="logo.png" class="logo">

<div class="titulo">Sabore In Casa</div>

</header>

<div class="endereco">

📍 Rua Maria de Lourdes da Cruz Nº 378  
Bairro Mantiqueira – Belo Horizonte

</div>

<div class="banner"></div>

<div class="container">

<input class="busca" id="busca" placeholder="🔎 Buscar produto">

<div class="categorias">

<div class="cat" onclick="filtrar('Pizza')">🍕 Pizzas</div>
<div class="cat" onclick="filtrar('Combo')">📦 Combos</div>
<div class="cat" onclick="filtrar('Cerveja')">🍺 Cervejas</div>
<div class="cat" onclick="filtrar('Coca')">🥤 Refrigerantes</div>

</div>

<div id="produtos"></div>

<div id="carrinho">

<h2>🛒 Carrinho</h2>

<div id="lista"></div>

<div class="total">
Total + entrega: R$ <span id="total">0.00</span>
</div>

<input id="enderecoCliente" placeholder="Digite seu endereço">

<select id="pagamento">
<option>PIX</option>
<option>Dinheiro</option>
<option>Cartão</option>
</select>

<input id="troco" placeholder="Troco para quanto?">

<button class="enviar" onclick="enviarPedido()">
Enviar pedido no WhatsApp
</button>

</div>

</div>

<div id="botaoCarrinho" onclick="scrollCarrinho()">
🛒
<div id="contador">0</div>
</div>

<script>

let numero="5531983391576"
let taxaEntrega=5

let carrinho=JSON.parse(localStorage.getItem("carrinho"))||[]
let produtos=[]

async function carregarProdutos(){

let resposta=await fetch("produtos.json")

produtos=await resposta.json()

mostrar(produtos)

}

function mostrar(lista){

let html=""

lista.forEach(p=>{

html+=`

<div class="card">

<img src="${p.foto}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/1046/1046784.png'">

<div class="card-content">

<h3>${p.nome}</h3>

<div class="preco">R$ ${p.preco.toFixed(2)}</div>

<button onclick="add('${p.nome}',${p.preco})">
Adicionar
</button>

</div>

</div>

`

})

document.getElementById("produtos").innerHTML=html

}

function filtrar(cat){

let filtrados=produtos.filter(p=>p.nome.includes(cat))

mostrar(filtrados)

}

document.getElementById("busca").addEventListener("input",function(){

let valor=this.value.toLowerCase()

let filtrados=produtos.filter(p=>p.nome.toLowerCase().includes(valor))

mostrar(filtrados)

})

function add(nome,preco){

let item=carrinho.find(p=>p.nome==nome)

if(item){

item.qtd++

}else{

carrinho.push({nome,preco,qtd:1})

}

salvar()

}

function salvar(){

localStorage.setItem("carrinho",JSON.stringify(carrinho))

atualizar()

}

function atualizar(){

let lista=""
let total=0
let qtd=0

carrinho.forEach((item,i)=>{

total+=item.preco*item.qtd
qtd+=item.qtd

lista+=`

<div class="item">

${item.nome} x${item.qtd}

<button onclick="remover(${i})">❌</button>

</div>

`

})

document.getElementById("lista").innerHTML=lista

document.getElementById("contador").innerText=qtd

document.getElementById("total").innerText=(total+taxaEntrega).toFixed(2)

}

function remover(i){

carrinho.splice(i,1)

salvar()

}

function scrollCarrinho(){

document.getElementById("carrinho").scrollIntoView({behavior:"smooth"})

}

function enviarPedido(){

let endereco=document.getElementById("enderecoCliente").value
let pagamento=document.getElementById("pagamento").value
let troco=document.getElementById("troco").value

let msg="🍕 Pedido Sabore In Casa %0A%0A"

let total=0

carrinho.forEach(item=>{

msg+=item.nome+" x"+item.qtd+"%0A"

total+=item.preco*item.qtd

})

msg+="%0ATaxa entrega: "+taxaEntrega
msg+="%0ATotal: "+(total+taxaEntrega).toFixed(2)

msg+="%0AEndereço: "+endereco
msg+="%0APagamento: "+pagamento
msg+="%0ATroco: "+troco

window.open("https://wa.me/"+numero+"?text="+msg)

}

carregarProdutos()

atualizar()

</script>

</body>
</html>
