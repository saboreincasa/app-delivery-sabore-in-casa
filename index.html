<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Sabore In Casa</title>

<link rel="stylesheet" href="estilo.css">

</head>

<body>

<header>

<img src="imagens/logo.png" class="logo">

<h1>Sabore In Casa</h1>

</header>


<div class="banner"></div>


<div class="container">

<input id="busca" class="busca" placeholder="🔎 Buscar pizza">

<div class="categorias">

<button onclick="filtrar('Pizza')">🍕 Pizzas</button>
<button onclick="filtrar('Bebida')">🥤 Bebidas</button>
<button onclick="filtrar('Cerveja')">🍺 Cervejas</button>

</div>

<div id="produtos"></div>

</div>


<!-- carrinho flutuante -->

<div id="botaoCarrinho" onclick="abrirCarrinho()">

🛒

<span id="contador">0</span>

</div>


<!-- carrinho lateral -->

<div id="carrinho">

<h2>Seu Carrinho</h2>

<div id="lista"></div>

<h3>Total: R$ <span id="total">0</span></h3>

<button onclick="finalizarPedido()" class="pagar">

FINALIZAR PEDIDO

</button>

</div>

<script src="app.js"></script>

</body>
</html>
