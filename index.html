<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sabore In Casa</title>

<link rel="stylesheet" href="style.css">

<style>
#toast{
visibility:hidden;
background:#333;
color:#fff;
padding:12px;
position:fixed;
bottom:50px;
left:50%;
transform:translateX(-50%);
border-radius:8px;
opacity:0;
transition:0.5s;
}
#toast.show{visibility:visible;opacity:1;bottom:80px;}

.btn-qtd{
background:#ff6600;
color:#fff;
border:none;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
}

.btn-remover{
color:red;
cursor:pointer;
font-weight:bold;
}
</style>
</head>

<body>

<header></header>

<div class="endereco">
📍 Mantiqueira - BH
<button onclick="abrirMapa()">Ver mapa</button>
</div>

<div id="banner"></div>

<div class="container">

<input id="busca" placeholder="Buscar">

<button onclick="abrirPizzas()">Pizzas</button>
<button onclick="filtrar('combos')">Combos</button>
<button onclick="filtrar('bebidas')">Bebidas</button>

<h2>Combos</h2>
<div id="combosSemana"></div>

<div id="produtos"></div>

<div id="carrinho">
<h2>Carrinho</h2>
<div id="lista"></div>
Total: R$ <span id="total">0</span>

<input id="enderecoCliente" placeholder="Endereço">

<button onclick="enviarPedido()">Enviar</button>
</div>

</div>

<div id="toast"></div>

<script src="app.js"></script>
</body>
</html>
