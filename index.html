<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Sabore In Casa</title>

<link rel="manifest" href="manifesto.json">
<link rel="stylesheet" href="css/estilo.css">

</head>

<body>

<header class="topo">

<img src="imagens/logo.png" class="logo">

<input type="text" id="busca" placeholder="Encontre sua pizza ou bebida">

</header>

<section class="banner">

<img src="imagens/banner.jpg">

</section>

<section class="categorias">

<button onclick="filtrar('pizza')">🍕 Pizzas</button>
<button onclick="filtrar('combo')">📦 Combos</button>
<button onclick="filtrar('bebida')">🥤 Bebidas</button>

</section>

<section id="produtos" class="lista-produtos"></section>

<div class="carrinho-btn" onclick="abrirCarrinho()">

🛒 <span id="contador">0</span>

</div>

<div id="carrinho" class="carrinho">

<h2>Seu Carrinho</h2>

<div id="itensCarrinho"></div>

<button onclick="enviarWhats()">Finalizar Pedido</button>

</div>

<script src="js/app.js"></script>
<script src="js/carrinho.js"></script>

<script>

if("serviceWorker" in navigator){
navigator.serviceWorker.register("service-worker.js")
}

</script>

</body>
</html>
