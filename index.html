<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Sabore in Casa</title>

<link rel="stylesheet" href="estilo.css">
<link rel="manifest" href="manifesto.json">

<script src="pix.js"></script>

</head>

<body>

<header>

<img src="imagens/logo.png" class="logo">

<input type="text" id="busca" placeholder="Buscar pizzas, bebidas ou combos">

<div class="menu">

<button onclick="mostrar('pizzas')">🍕 Pizzas</button>
<button onclick="mostrar('combos')">🔥 Combos</button>
<button onclick="mostrar('bebidas')">🥤 Bebidas</button>
<button onclick="abrirCarrinho()">🛒 Carrinho</button>

</div>

</header>

<main id="lista"></main>

<div id="carrinho" class="carrinho">

<h2>Seu Pedido</h2>

<div id="itens"></div>

<div id="total"></div>

<input id="endereco" placeholder="Digite seu endereço">

<button onclick="finalizar()">Finalizar Pedido</button>

</div>

<script src="app.js"></script>

</body>

</html>
