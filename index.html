<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Sabore In Casa</title>

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">

</head>

<body>

<header>

<img src="imagens/logo.png" class="logo">

<h1>Sabore In Casa</h1>

</header>

<div class="container">

<input id="busca" class="busca" placeholder="Buscar pizza, bebida...">

<div class="menu">

<button onclick="irPizzas()">🍕 Pizzas</button>

<button onclick="mostrar('bebidas')">🥤 Bebidas</button>

<button onclick="mostrar('combos')">🔥 Combos</button>

<button onclick="mostrar('snaks')">🍟 Snaks</button>

</div>

<div id="produtos"></div>

</div>

<div id="botaoCarrinho" onclick="abrirCarrinho()">

🛒
<span id="contador">0</span>

</div>

<div id="carrinho" class="carrinho">

<h2>Seu pedido</h2>

<div id="listaCarrinho"></div>

<div class="total">
Total: R$ <span id="total">0</span>
</div>

<select id="pagamento">

<option>PIX</option>
<option>Cartão</option>
<option>Dinheiro</option>

</select>

<input id="endereco" placeholder="Endereço">

<button class="enviar" onclick="enviarPedido()">
Enviar pedido
</button>

</div>

<script src="app.js"></script>

</body>
</html>
