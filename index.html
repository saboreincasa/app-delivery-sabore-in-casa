<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sabore In Casa</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="estilo.css">
</head>
<body>

<header>
  <img src="imagens/logo.png" class="logo" alt="Sabore In Casa Logo" />
  <div class="titulo">Sabore In Casa</div>
</header>

<div class="endereco">
  📍 Rua Maria de Lourdes da Cruz Nº 378  
  Bairro Mantiqueira – Belo Horizonte
</div>

<div class="banner"></div>

<div class="container">

  <input class="busca" id="busca" placeholder="🔎 Buscar produto" />

  <!-- Botões flutuantes abaixo da busca -->
  <div class="categorias">
    <div class="cat" onclick="window.location.href='pizza.html'">🍕 Pizzas</div>
    <div class="cat" onclick="filtrar('Bebida')">🥤 Bebidas</div>
    <div class="cat" onclick="filtrar('Combo')">📦 Combos</div>
    <div class="cat" onclick="filtrar('Promoção')">🎉 Promoções</div>
  </div>

  <div id="produtos"></div>

  <div id="carrinho">
    <h2>🛒 Carrinho</h2>
    <div id="lista"></div>

    <div class="total">
      Total + entrega: R$ <span id="total">0.00</span>
    </div>

    <input id="enderecoCliente" placeholder="Digite seu endereço" />
    <select id="pagamento">
      <option>PIX</option>
      <option>Dinheiro</option>
      <option>Cartão</option>
    </select>

    <input id="troco" placeholder="Troco para quanto?" />

    <button class="enviar" onclick="enviarPedido()">
      Enviar pedido no WhatsApp
    </button>
  </div>

</div>

<!-- Carrinho flutuante -->
<div id="botaoCarrinho" onclick="scrollCarrinho()">
  🛒
  <div id="contador">0</div>
</div>

<!-- Modal Meio a Meio -->
<div id="modalMeioMeio">
  <div class="modal-content">
    <h3>Escolha a outra metade da pizza</h3>
    <select id="segundaMetade"></select>
    <div class="modal-buttons">
      <button onclick="confirmarMeioMeio()">Confirmar</button>
      <button onclick="fecharModal()">Cancelar</button>
    </div>
  </div>
</div>

<script src="produtos.json"></script>
<script src="app.js"></script>
<script src="pizza.js"></script>
<script src="pix.js"></script>
<script src="mapa.js"></script>
<script src="impressao.js"></script>
<script src="notificacao.js"></script>

</body>
</html>
