<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Sabore In Casa</title>
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifesto.json">
</head>

<body>

<header>
  <img src="imagens/logo.png" class="logo" alt="Sabore In Casa Logo" />
  <div class="titulo">Sabore In Casa</div>
</header>

<div class="endereco">
  📍 Rua Maria de Lourdes da Cruz Nº 378  
  Bairro Mantiqueira – Belo Horizonte
</div>

<div class="banner"></div>

<div class="container">

  <input class="busca" id="busca" placeholder="🔎 Buscar produto" />

  <div class="categorias">
    <div class="cat" onclick="filtrar('Pizza')">🍕 Pizzas</div>
    <div class="cat" onclick="filtrar('Combo')">📦 Combos</div>
    <div class="cat" onclick="filtrar('Cerveja')">🍺 Cervejas</div>
    <div class="cat" onclick="filtrar('Refrigerante')">🥤 Refrigerantes</div>
  </div>

  <div id="produtos"></div>

  <div id="carrinho">
    <h2>🛒 Carrinho</h2>
    <div id="lista"></div>

    <div class="total">
      Total + entrega: R$ <span id="total">0.00</span>
    </div>

    <select id="borda">
      <option value="Sem borda">Sem borda</option>
      <option value="Cheddar">Cheddar</option>
      <option value="Catupiry">Catupiry</option>
    </select>

    <input id="enderecoCliente" value="Rua Maria de Lourdes da Cruz, Nº 378 - Mantiqueira, Belo Horizonte" />
    <select id="pagamento">
      <option>Cartão</option>
      <option>Dinheiro</option>
      <option>PIX</option>
    </select>

    <input id="troco" placeholder="Troco para quanto?" />

    <button class="enviar" onclick="enviarPedido()">Enviar pedido no WhatsApp</button>
  </div>

</div>

<div id="botaoCarrinho" onclick="scrollCarrinho()">
  🛒
  <div id="contador">0</div>
</div>

<!-- Modal Meio a Meio -->
<div id="modalMeioMeio">
  <div class="modal-content">
    <h3>Escolha a outra metade da pizza</h3>
    <select id="segundaMetade"></select>
    <div class="modal-buttons">
      <button onclick="confirmarMeioMeio()">Confirmar</button>
      <button onclick="fecharModal()">Cancelar</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
