<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Sabore in Casa</title>

<link rel="manifest" href="manifesto.json">
<link rel="stylesheet" href="estilo.css">

</head>

<body>

<header>

<img src="imagens/logo.png" class="logo">

</header>


<div class="busca">

<input id="buscar" placeholder="🔎 Encontre sua pizza ou bebida">

</div>


<section>

<h2>🍕 Pizzas</h2>

<div id="pizzas"></div>

</section>


<section>

<h2>🍺 Bebidas</h2>

<div id="bebidas"></div>

</section>


<section>

<h2>📦 Combos</h2>

<div id="combos"></div>

</section>


<section id="carrinho">

<h2>🛒 Seu Pedido</h2>

<div id="lista"></div>

<p class="total">Total: R$ <span id="total">0</span></p>

<input id="endereco" placeholder="Seu endereço">

<select id="pagamento">

<option>Pix</option>
<option>Dinheiro</option>
<option>Cartão</option>

</select>

<button onclick="enviarPedido()">Finalizar Pedido</button>

</section>


<script src="app.js"></script>

</body>
</html>
