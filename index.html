<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Sabore In Casa</title>

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="estilo.css">

</head>

<body>

<header>

<img src="imagens/logo.png" class="logo">

<h1>Sabore In Casa</h1>

<p class="endereco">
📍 Rua Maria de Lourdes da Cruz Nº 378  
Bairro Mantiqueira – Belo Horizonte
</p>

</header>

<div class="banner"></div>

<div class="container">

<input id="busca" placeholder="🔎 Buscar produto" class="busca">

<div class="categorias">

<div class="linha">

<button onclick="filtrar('Pizza')">🍕 Pizzas</button>
<button onclick="filtrar('Coca')">🥤 Bebidas</button>

</div>

<div class="linha">

<button onclick="filtrar('Combo')">🎁 Combos</button>
<button onclick="filtrar('Promo')">🔥 Promoções</button>

</div>

</div>

<div class="bannerPromo">
🔥 Promoções do dia
</div>

<div id="produtos"></div>

<div id="carrinho">

<h2>🛒 Carrinho</h2>

<div id="lista"></div>

<p>Total + entrega: R$ <span id="total">0.00</span></p>

<input id="enderecoCliente" placeholder="Digite seu endereço">

<select id="pagamento">

<option>PIX</option>
<option>Dinheiro</option>
<option>Cartão</option>

</select>

<input id="troco" placeholder="Troco para quanto?">

<button onclick="enviarPedido()" class="enviar">
Enviar pedido no WhatsApp
</button>

</div>

</div>

<div id="botaoCarrinho" onclick="scrollCarrinho()">

🛒

<span id="contador">0</span>

</div>

<script src="app.js"></script>

</body>

</html>
