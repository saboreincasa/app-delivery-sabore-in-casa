<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Sabore In Casa</title>

<link rel="stylesheet" href="estilo.css">
<link rel="manifest" href="manifesto.json">

</head>

<body>

<header class="header">

<div class="topo">

☰

<h1>Sabore In Casa</h1>

🛒

</div>

<section class="banner">

<h2>Combo Especial</h2>

<p>2 Pizzas + 2 Refrigerantes</p>

</section>


<section class="categorias">

<button onclick="filtrar('pizza')">🍕 Pizzas</button>
<button onclick="filtrar('combo')">🔥 Combos</button>

<div class="carrinho-flutuante" onclick="abrirCarrinho()">

🛒 <span id="contador">0</span>

</div>

<h2>Seu Pedido</h2>

<div id="listaCarrinho"></div>

<h3>Total R$ <span id="total">0</span></h3>

<button onclick="pagarPix()">Pagar com Pix</button>

<button onclick="enviarWhats()">Enviar WhatsApp</button>

</div>


<script src="app.js"></script>
<script src="pix.js"></script>
