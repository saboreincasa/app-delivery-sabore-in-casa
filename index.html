<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pizzaria & Distribuidora</title>

<link rel="manifest" href="manifest.json">

<style>

body{
font-family:Arial;
margin:0;
background:#111;
color:white;
}

header{
background:#e53935;
padding:20px;
text-align:center;
font-size:24px;
}

.container{
padding:20px;
}

.card{
background:#1e1e1e;
padding:15px;
border-radius:10px;
margin-bottom:20px;
}

.card img{
width:100%;
border-radius:10px;
}

.preco{
color:#4caf50;
font-weight:bold;
}

button{
background:#00c853;
border:none;
padding:10px;
width:100%;
border-radius:8px;
color:white;
margin-top:5px;
}

#carrinho{
position:fixed;
bottom:20px;
right:20px;
background:#ff9800;
padding:15px;
border-radius:50%;
cursor:pointer;
font-size:22px;
}

</style>

</head>

<body>

<header>
🍕 Pizzaria & 🍺 Distribuidora
</header>

<div class="container">

<h2>Pizzas</h2>
<div id="pizzas"></div>

<h2>Bebidas Geladas</h2>
<div id="bebidas"></div>

</div>

<div id="carrinho" onclick="pedido()">🛒</div>

<script>

let carrinho=[]

fetch("produtos.json")
.then(res=>res.json())
.then(data=>{

let pizzasHTML=""

data.pizzas.forEach(p=>{

pizzasHTML+=`
<div class="card">

<img src="${p.foto}">

<h3>Pizza ${p.nome}</h3>

<button onclick="add('Pizza ${p.nome} 25cm')">
25cm - R$ ${p.tamanhos["25cm"]}
</button>

<button onclick="add('Pizza ${p.nome} 30cm')">
30cm - R$ ${p.tamanhos["30cm"]}
</button>

<button onclick="add('Pizza ${p.nome} 35cm')">
35cm - R$ ${p.tamanhos["35cm"]}
</button>

</div>
`
})

document.getElementById("pizzas").innerHTML=pizzasHTML


let bebidasHTML=""

data.bebidas.forEach(b=>{

bebidasHTML+=`
<div class="card">

<img src="${b.foto}">

<h3>${b.nome}</h3>

<p class="preco">R$ ${b.preco}</p>

<button onclick="add('${b.nome}')">
Adicionar
</button>

</div>
`
})

document.getElementById("bebidas").innerHTML=bebidasHTML

})

function add(produto){

carrinho.push(produto)

alert("Adicionado ao carrinho")

}

function pedido(){

let numero="5531983391576"

let msg="Pedido:%0A"

carrinho.forEach(p=>{

msg+="- "+p+"%0A"

})

window.open("https://wa.me/"+numero+"?text="+msg)

}

</script>

</body>
</html>
